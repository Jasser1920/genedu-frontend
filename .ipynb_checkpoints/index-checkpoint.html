<!DOCTYPE html>
<html lang="en">
<head>  
<meta charset="UTF-8">   
<title>GAI Learning Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo&family=Tajawal&display=swap" rel="stylesheet"> 
    
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/panzoom@9.4.0/dist/panzoom.min.js"></script>

<script>
mermaid.initialize({
  startOnLoad: false,
  theme: "default",
  themeVariables: {
    primaryColor: "#4facfe",
    primaryTextColor: "#ffffff",
    primaryBorderColor: "#4facfe",
    lineColor: "#333",
    secondaryColor: "#00c6ff",
    tertiaryColor: "#f0f4ff",
    fontFamily: "Segoe UI"
  }
});
</script>
    
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e3f2fd, #fce4ec);
  padding: 40px;
}

.container {
  max-width: 750px;
  margin: auto;
  overflow: visible;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}
    
h1 {
  text-align: center;
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #43a047;
}

#output {
  margin-top: 30px;
}

/* QUIZ */
.quiz-question {
  margin-bottom: 25px;
  padding: 15px;
  background: #f9f9f9;
  border-radius: 8px;
}

.choice {
  display: block;
  padding: 10px;
  margin-bottom: 8px;
  background: white;
  border-radius: 6px;
  border: 1px solid #ddd;
  cursor: pointer;
}

.choice:hover {
  background: #e3f2fd;
}

.correct {
  background: #c8e6c9 !important;
}

.wrong {
  background: #ffcdd2 !important;
}

/* RESULT */
.result-box {
  text-align: center;
  padding: 25px;
  background: #e8f5e9;
  border-radius: 12px;
  margin-bottom: 20px;
}
.result-box h3 {
  margin-top: 15px;
  color: #333;
}    

.feedback {
  margin-top: 15px;
  padding: 15px;
  border-radius: 8px;
  background: #fff3cd;
}

.progress-bar {
  width: 100%;
  height: 12px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}

#progress-fill {
  height: 100%;
  width: 33%;
  background: #ef5350;
  border-radius: 10px;
  transition: width 0.5s;
}

.level-badge {
  display: inline-block;
  padding: 6px 15px;
  border-radius: 20px;
  color: white;
  font-weight: bold;
}
    
.result-box {
  animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

body {
  font-family: 'Cairo', 'Tajawal', 'Segoe UI', sans-serif;
}

    
.lang-dropdown {
  position: absolute;
  top: 10px;
  left: 15px;
  border-radius: 6px;
    
  width: 100px;
  padding: 10px;
  font-size: 15px;
}
.title {
  text-align: center;
  margin-top: 50px;
  font-weight: Extra-bold;

  background: linear-gradient(to right, #4facfe, #00f2fe);
  -webkit-background-clip: text;
  
    
  text-shadow: 0px 3px 10px rgba(0, 0, 0, 0.2);
}

.diagram-card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  animation: fadeIn 0.4s ease-in-out;
}

.diagram-header {
  display: flex;
  justify-content: center; /* بدل space-between */
  align-items: center;
  position: relative;
}

.diagram-header h3 {
  margin: 0;
  font-size: 18px;
  text-align: center;
}

.diagram-header button {
  background: #4facfe;
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.diagram-header button:hover {
  background: #3a8dde;
}

.diagram-body {
  background: #f9fbff;
  padding: 20px;
  border-radius: 12px;
  overflow-x: auto;
}

.mermaid {
  display: flex;
  justify-content: center;
}
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #4facfe;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
#output {
  margin-top: 20px;
}

</style>
</head>

<body>

    
<div class="container">
    <div class="form-section">
         <!-- LANGUAGE -->
         <select id="language" class="lang-dropdown" onchange="handleLanguageChange()">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="ar">العربية</option>
        </select>
        <h1 class="title">AI-Powered Personalized Learning Assistant</h1>
        <div class="card">
         <!-- QUESTION -->
        <input id="question" placeholder="Ask anything..." />

         <!-- LEVEL -->
        <select id="level">
          <option value="">🤖 Auto (AI Level)</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>

         <!-- GOAL -->
        <select id="goal">
          <option value="answer">Explanation</option>
          <option value="quiz">Quiz</option>
        </select>
            
        <!-- BUTTONS --> 
         <div class="buttons">   
          <button onclick="ask()">Generate</button>
         </div>

        <select id="diagramType">
          <option value="auto">🤖 Auto</option>
          <option value="flowchart">Flowchart</option>
          <option value="sequence">Sequence</option>
          <option value="architecture">Architecture</option>
        </select>
         <div class="buttons">     
          <button onclick="generateDiagram()">📊 Generate Diagram</button> 
        </div>
        </div>
    
    <div class="pdf-section">
        
          <h3>📄 Upload Course (PDF)</h3>
        
          <input type="file" id="pdfFile" accept="application/pdf" />
        
          <button onclick="uploadPDF()">
            Upload & Analyze
          </button>

    </div>     
        
        <!-- Progress -->
        <div class="card">
          <h3>📈 Your Progress</h3>
          <div id="level-text">Level: BEGINNER</div>
        
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>
            
    </div> 
 <div id="output"></div>

</div>

<script>

// ================= ASK =================
function ask() {
  const question = document.getElementById("question").value.trim();
  const level = document.getElementById("level").value;
  const goal = document.getElementById("goal").value;
  const output = document.getElementById("output");
  let language = document.getElementById("language").value || null; 

  if (!question) {
    output.innerHTML = "<p style='color:red'>Please enter a question</p>";
    return;
  }

  output.innerHTML = "<p>⏳ Generating...</p>";

  fetch("http://127.0.0.1:8000/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      question: question,
      level: level,   // 
      goal: goal,
      language: language })
  })
  .then(res => res.json())
  .then(data => {

    console.log("DATA:", data);

    // ================= QUIZ =================
    if (data.type === "quiz") {
       window.lastResponse = JSON.stringify({
          type: "quiz",
          data: data.questions
        }); 
         window.currentLanguage = data.language;
        
      if (!data.questions || data.questions.length === 0) {
        output.innerHTML = "<p style='color:red'>⚠️ Quiz generation failed</p>";
        return;
      }

      window.currentQuiz = data.questions;

      let html = `<h2>📝 Quiz (${data.level})</h2>`;

      data.questions.forEach((q, i) => {
        html += `<div class="quiz-question">`;
        html += `<p><b>${i+1}. ${q.question}</b></p>`;

        q.choices.forEach(choice => {
          html += `
            <label class="choice">
              <input type="radio" name="q${i}" value="${choice}">
              ${choice}
            </label>
          `;
        });

        html += `</div>`;
      });

      html += `<button onclick="submitQuiz()">Submit Quiz</button>`;

      output.innerHTML = html;
      return;
    }

    // ================= ANSWER =================
    if (data.type === "answer") {
      window.lastResponse = data.content;  
      output.innerHTML = `
          <h2>💡 Explanation</h2>
        
          <p style="
            font-size:13px;
            color:#777;
            margin-bottom:10px;
          ">
            Level: ${(data.level || "beginner").toUpperCase()}
          </p>
        
          <div id="answer-box" style="
            background:#f9f9f9;
            padding:15px;
            border-radius:10px;
            white-space: pre-line;
            line-height:1.7;
          ">
            ${data.content}
          </div>
        `;
      return;
    }

    output.innerHTML = "<p>No response</p>";
  })
  .catch(err => {
    console.error(err);
    output.innerHTML = "<p style='color:red'>Error connecting to backend</p>";
  });
}


// ================= SUBMIT QUIZ =================
function submitQuiz() {

  const answers = [];

  window.currentQuiz.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);

    if (selected) {
      answers.push({
        question: q.question,
        selected: selected.value
      });
    }
  });

  if (answers.length === 0) {
  document.getElementById("output").innerHTML = `
    <div style="
      background:#ffcdd2;
      padding:15px;
      border-radius:8px;
      color:#b71c1c;
      font-weight:bold;
      text-align:center;
    ">
      ⚠️ Please select at least one answer
    </div>
  `;
  return;
}

  fetch("http://127.0.0.1:8000/evaluate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      level: document.getElementById("level").value,
      answers: answers
    })
  })
  .then(res => res.json())
  .then(data => {

      // ===== UPDATE PROGRESS =====
    let progress = 33;
    let color = "#ef5350";
    
    if (data.level === "intermediate") {
      progress = 66;
      color = "#ffa726";
    } else if (data.level === "advanced") {
      progress = 100;
      color = "#66bb6a";
    }
    
    document.getElementById("progress-fill").style.width = progress + "%";
    document.getElementById("progress-fill").style.background = color;
    document.getElementById("level-text").innerText =
      "Level: " + (data.level || "beginner").toUpperCase();
    console.log("EVAL RESPONSE:", data); // 🔥 debug

    let html = `
      <div class="card result-box">
        <h2>📊 Performance</h2>
    
        <p style="font-size:18px;">
          <b>${data.score} / ${data.total}</b>
        </p>
    
        <p style="font-size:16px;">
          ${data.percentage}%
        </p>
    
        <div style="margin-top:15px;">
          <span style="
            padding:8px 15px;
            border-radius:20px;
            background:${
              data.level === "advanced" ? "#66bb6a" :
              data.level === "intermediate" ? "#ffa726" : "#ef5350"
            };
            color:white;
            font-weight:bold;
          ">
            ${(data.level || "beginner").toUpperCase()}
          </span>
        </div>
    
        <p style="margin-top:10px; font-style:italic;">
          ${data.feedback}
        </p>
      </div>
    `;

    window.currentQuiz.forEach((q, i) => {

      html += `<div class="card quiz-question">`;
      html += `<p><b>${i+1}. ${q.question}</b></p>`;

      const userAnswer = answers.find(a => a.question === q.question);

      q.choices.forEach(choice => {

        let className = "choice";

        if (choice === q.answer) {
          className += " correct";
        }

        if (userAnswer && choice === userAnswer.selected && choice !== q.answer) {
          className += " wrong";
        }

        html += `<div class="${className}">${choice}</div>`;
      });

      if (userAnswer && userAnswer.selected === q.answer) {
        html += `<p style="color:green">✔ Correct</p>`;
      } else {
        html += `<p style="color:red">❌ Wrong</p>`;
        html += `<p><b>Correct answer:</b> ${q.answer}</p>`;
      }

      html += `</div>`;
    });

    document.getElementById("output").innerHTML = html;
  })
  .catch(err => {
    console.error(err);
    document.getElementById("output").innerHTML = `
  <div style="
    background:#ffcdd2;
    padding:15px;
    border-radius:8px;
    color:#b71c1c;
    text-align:center;
  ">
    ❌ Error displaying results. Please try again.
  </div>
`;
  });
}

function handleLanguageChange() {

  const lang = document.getElementById("language").value;

  if (!window.lastResponse) return;

  let parsed;

  try {
    parsed = JSON.parse(window.lastResponse);
  } catch {
    parsed = null;
  }

  // ================= QUIZ =================
  if (parsed && parsed.type === "quiz") {

    fetch("http://127.0.0.1:8000/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text: JSON.stringify(parsed.data),
        target_language: lang
      })
    })
    .then(res => res.json())
    .then(data => {

      const questions = JSON.parse(data.translated);

      let html = `<h2>📝 Quiz</h2>`;

      questions.forEach((q, i) => {
        html += `<div class="quiz-question">`;
        html += `<p><b>${i+1}. ${q.question}</b></p>`;

        q.choices.forEach(choice => {
          html += `<label class="choice">${choice}</label>`;
        });

        html += `</div>`;
      });

      document.getElementById("output").innerHTML = html;
    });

    return;
  }

  // ================= ANSWER =================
  fetch("http://127.0.0.1:8000/translate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      text: window.lastResponse,
      target_language: lang
    })
  })
  .then(res => res.json())
  .then(data => {

    const isArabic = lang === "ar" || data.translated.match(/[\u0600-\u06FF]/);

    document.getElementById("answer-box").innerHTML = `
      <div style="
        direction: ${isArabic ? "rtl" : "ltr"};
        text-align: ${isArabic ? "right" : "left"};
      ">
        ${data.translated}
      </div>
    `;

  });
}
// ================= gen-diagram =================
async function generateDiagram() {

  const q = document.getElementById("question").value;

  if (!q) {
    document.getElementById("output").innerHTML =
      "<p style='color:red'>Enter a topic first</p>";
    return;
  }

    document.getElementById("output").innerHTML = `
      <div style="text-align:center; padding:40px;">
        <div class="loader"></div>
        <p style="margin-top:15px; font-weight:bold;">
          🧠 AI is designing architecture...
        </p>
      </div>
    `;

  try {
    const res = await fetch("http://127.0.0.1:8000/generate-diagram", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        prompt: q,
        type: document.getElementById("diagramType").value
      })
    });

    const data = await res.json();

    if (data.error) {
      document.getElementById("output").innerHTML =
        `<p style="color:red">${data.error}</p>`;
      return;
    }

    if (!data.diagram) {
      document.getElementById("output").innerHTML =
        "<p style='color:red'>❌ Diagram generation failed</p>";
      return;
    }

    // تنظيف الكود
    const clean = data.diagram
      .replace(/```mermaid/g, "")
      .replace(/```/g, "")
      .trim();
      const fixed = clean
          .replace(/\|\>/g, "|")
          .replace(/>\s+/g, " ")
          .replace(/--(?!>)/g, "-->")   
          .replace(/([A-Za-z0-9_]+)(👤|💻|⚙️...)/g, "$1");

      if (!fixed.includes("flowchart") && !fixed.includes("sequenceDiagram")) {
          document.getElementById("output").innerHTML =
            "<p style='color:red'>❌ Invalid diagram format</p>";
          return;
        }
        
        console.log("DIAGRAM CODE:\n", fixed);
      
     document.getElementById("output").innerHTML = `
          <div class="diagram-card">
        
            <div class="diagram-header">
              <h3>📊 ${q}</h3>
            </div>
        
            <div class="diagram-body">
              <div class="mermaid">
                ${fixed}
              </div>
            </div>
            <div id="diagram-explanation" style="
              margin-top:15px;
              background:#f9f9f9;
              padding:15px;
              border-radius:10px;
            ">
              ⏳ Generating explanation...
            </div>

            <div style="text-align:right; margin-top:15px;">
              <button id="downloadBtn" onclick="downloadDiagram()" style="
                width:auto;
                padding:8px 14px;
                font-size:13px;
                background:#4facfe;
              ">
                ⬇ Download
              </button>
            </div>
        
          </div>
        `;
            fetch("http://127.0.0.1:8000/explain-diagram", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({
                diagram: clean   
              })
            })
            .then(res => res.json())
            .then(data => {
            
              const formatted = data.explanation
                .replace(/\n/g, "<br>");
            
              document.getElementById("diagram-explanation").innerHTML = formatted;
            });
        

    setTimeout(() => {
      try {
        mermaid.init(undefined, document.querySelectorAll(".mermaid"));
        document.getElementById("downloadBtn").disabled = false;
      } catch (e) {
        console.error("Mermaid error:", e);
    
        document.querySelector(".mermaid").innerHTML = `
          <div style="color:red; text-align:center;">
            ⚠️ Invalid diagram generated<br>
            Please try again
          </div>
        `;
      }
    }, 300);
    setTimeout(() => {
      const element = document.querySelector(".mermaid svg");
    
      if (element) {
        panzoom(element, {
          maxZoom: 5,
          minZoom: 0.5
        });
      }
    }, 500);
  } catch (err) {
    console.error(err);
    document.getElementById("output").innerHTML =
      "<p style='color:red'>❌ Error</p>";
  }
}

// =================downloadDiagram =================
function downloadDiagram() {
  const svg = document.querySelector(".mermaid svg");

  if (!svg) {
    alert("Diagram not ready");
    return;
  }

  const serializer = new XMLSerializer();
  let source = serializer.serializeToString(svg);

  const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "diagram.svg";
  a.click();

  URL.revokeObjectURL(url);
}
    // ================= pdf-upload =================
async function uploadPDF() {
  const file = document.getElementById("pdfFile").files[0];

  if (!file) {
    alert("Choose a PDF first");
    return;
  }

  let formData = new FormData();
  formData.append("file", file);

  const res = await fetch("http://127.0.0.1:8000/upload-pdf", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

    let html = `
      <h3>📘 Summary</h3>
       <div id="answer-box" style="
            background:#f9f9f9;
            padding:15px;
            border-radius:10px;
            white-space: pre-line;
            line-height:1.7;
          ">
      ${data.summary}
      </div>
    
      <h2>📝 Quiz</h2>
    `;
    
    data.quiz.forEach((q, i) => {
      html += `<div class="quiz-question">`;
      html += `<p><b>${i+1}. ${q.question}</b></p>`;
    
      q.choices.forEach(choice => {

          let style = "";
        
          if (choice === q.answer) {
            style = "background:#c8e6c9; font-weight:bold;";
          }
        
          html += `<div class="choice" style="${style}">
            ${choice}
          </div>`;
        });
    
      html += `</div>`;
    });
    
    document.getElementById("output").innerHTML = html;
    }

</script>

</body>
</html>
